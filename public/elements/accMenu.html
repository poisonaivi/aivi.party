<style>
    @font-face {
        font-family: "acc-dyslexic";
        src: url(/fonts/OpenDyslexic-Regular.otf) format("opentype");
        size-adjust: 83%;
        ascent-override: 110%;
        descent-override: 40%;
    }

    /* @font-face {
        font-family: "acc-sansserif";
        src: url(/fonts/Exo-Variable.ttf) format("truetype");
        size-adjust: 90%;
        ascent-override: 106%;
    } */

    /* @font-face {
        font-family: "acc-serif";
        src: url(/fonts/MicaValo.ttf) format("truetype");
        size-adjust: 92%;
    } */

    @font-face {
        font-family: "acc-monospace";
        src: url(/fonts/UbuntuMono-Regular.ttf) format("truetype");
        ascent-override: 95%;
        descent-override: 30%;
    }

    :root {
        --acc-accent: #95c;
        --acc-border: #fff;
        --acc-accent-text: #fff;
        --acc-bg: #ccc;
    }

    #acc-button {
        width: 40px;
        aspect-ratio: 1;
        z-index: 100;
        position: fixed;
        left: 8px;
        bottom: 8px;
        border: solid 3px var(--acc-border);
        border-radius: 100%;
        background-color: var(--acc-accent);
        background-image: url(/assets/icons/accessibility.png);
        background-size: cover;
    }

    #acc-menu {
        visibility: hidden;
        width: 500px;
        max-width: 100vw;
        min-height: fit-content;
        max-height: 100vh;
        z-index: 101;
        position: fixed;
        left: 7px;
        bottom: 7px;
        border-radius: 20px;
        background-color: var(--acc-bg);
        border: ridge 2px var(--acc-accent);
        overflow: hidden;
        font-family: acc-monospace, sans-serif;
        color: #000;
        input, label {
            cursor: pointer;
            margin: 10px 0;
        }
        div {
            padding: 8px 16px;
            margin-bottom: 10px;
        }
    }

    button {
        border: none;
        background: none;
        font: inherit;
        color: var(--acc-accent-text);
        &:hover {
            opacity: 0.5;
            cursor: pointer;
        }
    }

    .acc-title {
        background-color: var(--acc-accent);
        color: var(--acc-accent-text);
    }
</style>
<button id="acc-button" onclick="accMenuOpen();" title="Open Accessibility Menu"></button>
<div id="acc-menu">
    <div class="acc-title">
        <img src="/assets/icons/accessibility.png" style="float: left; transform: translate(-3px, -2px);"><b>Accessibility Menu</b>
        <button onclick="accMenuClose();" style="float: right; transform: translateY(-1px);" title="Close Accessibility Menu"><u>Close</u></button>
    </div>
    <div class="acc-options">
        <fieldset>
            <legend><b>visual:</b></legend>
            <input type="checkbox" id="novfx" onclick="accChange();">
            <label for="novfx">disable visual effects</label>
            <br>
            <input type="checkbox" id="desat" onclick="accChange();">
            <label for="desat">reduce bright colors</label>
            <br>
            <input type="checkbox" id="contrast" onclick="accChange();">
            <label for="contrast">increase contrast</label>
            <br>
            <input type="checkbox" id="invert" onclick="accChange();">
            <label for="invert">invert colors</label>
        </fieldset>
        <br>
        <fieldset>
            <legend><b>typeface:</b></legend>
            <input type="radio" id="sitefont" name="font" onclick="accChange();" checked>
            <label for="sitefont" style="font-family: monopix;">pixelated (default)</label>
            <br>
            <input type="radio" id="monofont" name="font" onclick="accChange();">
            <label for="monofont" style="font-family: acc-monospace;">smooth</label>
            <br>
            <input type="radio" id="dysfont" name="font" onclick="accChange();">
            <label for="dysfont" style="font-family: acc-dyslexic;">OpenDyslexic (experimental)</label>
            <!-- <input type="radio" id="sansfont" name="font" onclick="accChange();">
            <label for="sansfont" style="font-family: acc-sansserif;">Sans-serif</label>
            <br>
            <input type="radio" id="seriffont" name="font" onclick="accChange();">
            <label for="seriffont" style="font-family: acc-serif;">Serif</label>
            <br> -->
        </fieldset>
        <br>
        <i>Performance may vary depending on your browser and device type. Settings are saved on your device.</i>
    </div>
</div>
