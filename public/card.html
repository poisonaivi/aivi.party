<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.75">
    <title>PoisonAivi</title>
    <script src="/app.js"></script>
    <link rel="stylesheet" href="/card.css">
    <link rel="icon" href="/assets/amethyst-tilted-lowres.png">
</head>
<body>
    <div id="accessibility" hidden><script defer src="/elements/accScript.js"></script></div>
    <main>
        <section class="main">
            <div id="left">
                <img src="/assets/aivicardimage.png" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10%; mask: url('/assets/pixel-circle-mask.png') 0 / 100%; display: block; margin: 0 auto;">
            </div>
            <div id="right">
                <h2>PoisonAivi</h2>
                <p>web dev & furry artist • <span id="localTime" class="num">--:--:--</span></p>
                <hr>
                <p><a href="/index.html"><img class="icon inline-left" src="/assets/icons/home.png">homepage</a></p>
                <p><a href="https://github.com/poisonaivi"><img class="icon inline-left" src="/assets/logos/github.png">github</a></p>
                <p><a href="https://bsky.app/profile/aivi.party"><img class="icon inline-left" src="/assets/logos/bluesky.png">bsky</a></p>
                <!-- <p><a href="https://matrix.to/#/@poisonaivi:matrix.org"><img class="icon inline-left" src="/assets/logos/matrix.png">matrix</a></p> -->
                <p><a href="mailto:poison@aivi.party"><img class="icon inline-left" src="/assets/icons/mail.png">poison@aivi.party</a></p>
            </div>
            <a onclick="toggleQr();" style="position: absolute; bottom: 0; right: 2px; padding: 10px;">
                <img class="icon" src="/assets/icons/scan.png">
            </a>
            <script>updateClockTime();</script>
        </section>
        <!-- <footer class="main" id="footer"><script>loadElement("footer.html", "footer");</script></footer>  -->
    </main>
    <section id="qrcode" style="width: 350px; max-width: 70%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: hidden; display: none;">
        <div style="padding: 2px; background-color: var(--border); text-align: center;">
            <span class="text">http://aivi.party</span>
            <a href="/assets/qrcode.png" download="aivipartyQR" style="float: left;">
                <img class="icon inline-right" src="/assets/icons/download.png">
            </a>
            <a onclick="toggleQr();" style="float: right;">
                <img class="icon inline-left" src="/assets/icons/x-no.png">
            </a>
        </div>
        <img src="/assets/qrcode.png" style="display: block; width: 100%;">
        <script>
            var codeShown = true;
            const qrcode = document.getElementById("qrcode");
            function toggleQr() {
                if (codeShown) {
                    qrcode.style.display = "block";
                } else {
                    qrcode.style.display = "none";
                }
                codeShown = !codeShown;
            }
        </script>
    </section>
</body>
</html>
