<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF version</title>
</head>
<body>
    Check console.
    <script>
        console.log("fetching:");
        fetch('https://aivi.party')
        .then(response => {
            console.log('Response Status:', response.status);
            return response.text(); // Get response as text first
        })
        .then(text => {
            console.log('Response Body:', text); // Log the raw response body
            try {
                const data = JSON.parse(text); // Try to parse it
                console.log("Cloudflare Worker Version Info:", data);
            } catch (error) {
                console.error('Failed to parse JSON:', error);
            }
        })
        .catch(error => console.error('Error fetching version info:', error));
    </script>
</body>
</html>
