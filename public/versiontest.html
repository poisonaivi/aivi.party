<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF version</title>
</head>
<body>
    Check console.
    <script>
        fetch('https://aiviparty.x3amethyst.workers.dev')
            .then(response => response.json())
            .then(data => {
                // Log the version information to the browser console
                console.log("Cloudflare Worker Version Info:", data);
            })
            .catch(error => console.error('Error fetching version info:', error));
    </script>
</body>
</html>
