<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.38">
    <title>404 Not Found</title>
    <script src="/app.js"></script>
    <link rel="stylesheet" href="/main.css">
    <link rel="icon" href="/assets/aivi-logo-2026-pix.png">
</head>
<body>
    <div id="accessibility" hidden><script defer src="/elements/accScript.js"></script></div>
    <main>
        <div style="height: 120px;"></div>
        <div style="width: fit-content; margin: 0 auto;">
            <h1 class="danger" style="position: absolute; translate: 170px -20px; animation: bounce 1s steps(1) infinite;">?</h1>
            <h1 class="danger" style="position: absolute; translate: -80px 40px; animation: bounce 1s steps(1) infinite; animation-delay: 250ms;">?</h1>
            <h2 class="danger" style="position: absolute; translate: -80px -50px; animation: bounce 1s steps(1) infinite; animation-delay: 500ms;">error</h2>
            <h2 class="danger" style="position: absolute; translate: 150px 110px; animation: bounce 1s steps(1) infinite; animation-delay: 750ms;">404</h2>
            <img style="position: relative; z-index: 1; width: 150px; translate: -7px 0; filter: drop-shadow(4px 4px var(--shadow)) drop-shadow(0 0 12px #90ba);" src="/assets/aivi-logo-2026-pix.png">
        </div>
        <div style="height: 80px;"></div>
        <div style="text-align: center;">
            <p>the magical little creature inside this server<br>couldn't find what you were looking for</p>
            <br><br>
            <p><a href="/index.html"><img class="icon inline-left" src="/assets/icons/arrow-l.png">head home</a></p>
            <div style="height: 100px;"></div>
            <p><small class="danger">request returned status code 404 Not Found <a href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/404" target="_blank">[MDN ref]</a></small></p>
        </div>
        <footer id="footer"><script>loadElement("simpleFooter.html", "footer");</script></footer> 
    </main>

</html>
