<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.38">
    <title>guestbook • AIVI.PARTY!</title>
    <script src="/app.js"></script>
    <link rel="stylesheet" href="/main.css">
    <link rel="icon" href="/assets/aivi-logo-2026-s.png">
</head>
<body>
    <div id="accessibility" hidden><script defer src="/elements/accScript.js"></script></div>
    <main>
        <header class="main" id="header"><script defer src="/elements/headerScript.js"></script></header>
        <noscript>
            <section class="danger">
                <h3 class="danger"><img class="icon inline-left" src="/assets/icons/error.png">JavaScript disabled</h3>
                <br>
                <p>congrats, you tripped the noscript element! this site isn't gonna steal your data, but it relies on scripts to display navigation elements and fetch external content.</p>
                <br>
                <p>for a better experience, consider <a href="https://javascript.aivi.party/" target="_blank">enabling JavaScript</a> or whitelisting this site.</p>
            </section>
        </noscript>
        <table class="main">
            <tr>
                <td class="secondaryColumn">
                    <section>
                        <h3>leave a msg!</h3>
                        <p>If you write something nice, I'll try to get back to you as soon as I can!</p>
                    </section>
                    <section>
                        <p class="success">Update from Jan 22, 2026:</p>
                        <p>I've just restored all the messages left on the really old guestbook. They should be correctly timestamped and attributed!</p>
                    </section>
                </td>
                <td class="primaryColumn">
                    <section class="important" style="padding: 0; overflow: hidden;">
                        <iframe id="guestbookEmbed" src="https://poisonaivi.atabook.org/" style="width: 100%; height: 1800px; margin-top: -75px;"></iframe>
                    </section>
                </td>
            </tr>
        </table>
        <footer class="main" id="footer"><script>loadElement("footer.html", "footer");</script></footer> 
    </main>
</body>
</html>
