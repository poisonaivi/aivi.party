<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.38">
    <title>guestbook • AIVI.PARTY!</title>
    <script src="/app.js"></script>
    <link rel="stylesheet" href="/main.css">
    <link rel="icon" href="/assets/amethyst-tilted-lowres.png">
</head>
<body>
    <div id="accessibility" hidden><script defer src="/elements/accScript.js"></script><script>loadElement("accMenu.html", "accessibility", );</script></div>
    <main>
        <header class="main" id="header"><script>loadElement("header.html", "header");</script></header>
        <noscript>
            <br>
            <section class="danger">
                <h3 class="danger">Hey! JavaScript is disabled in your browser.</h3>

                <br>
                <p>Here's a <a href="https://javascript.amethystx.net/" target="_blank">simple guide to enable JavaScript</a> for most browsers.</p>
            </section>
        </noscript>
        <table class="main">
            <tr>
                <td class="secondaryColumn">
                    <section>
                        <h3>leave a msg!</h3>
                        <p>If you write something nice, I'll try to get back to you as soon as I can!</p>
                    </section>
                    <section>
                        <p class="success">Update from Jan 22, 2026:</p>
                        <p>I've just restored all the messages left on the really old guestbook. They should be correctly timestamped and attributed!</p>
                    </section>
                </td>
                <td class="primaryColumn">
                    <section class="important" style="padding: 0; overflow: hidden;">
                        <iframe id="guestbookEmbed" src="https://poisonaivi.atabook.org/" style="width: 100%; height: 1800px; margin-top: -60px;"></iframe>
                    </section>
                </td>
            </tr>
        </table>
        <footer class="main" id="footer"><script>loadElement("footer.html", "footer");</script></footer> 
    </main>
